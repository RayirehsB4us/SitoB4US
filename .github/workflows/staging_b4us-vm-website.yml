name: Deploy Frontend to VM - b4us-staging-website

on:
  push:
    branches: [staging]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, staging-server]
    environment: staging

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: 🚀 Deploy Frontend
        run: |
          echo "🚀 Starting frontend deployment..."

          PROJECT_DIR="/home/sdev/SitoB4US/frontend"

          cd "$PROJECT_DIR"

          echo "📥 Pulling latest changes..."
          git fetch origin staging
          git reset --hard origin/staging

          # Install dependencies only if needed
          echo "📦 Checking frontend dependencies..."
          if [ ! -d node_modules ]; then
            echo "node_modules not found. Installing dependencies..."
            npm ci --production --silent
          elif [ package-lock.json -nt node_modules ]; then
            echo "package-lock.json changed. Reinstalling dependencies..."
            npm ci --production --silent
          elif [ package.json -nt node_modules ]; then
            echo "package.json changed. Installing updated dependencies..."
            npm ci --production --silent
          else
            echo "Dependencies are up to date."
          fi

          # Restart the service
          echo "🔄 Restarting frontend service..."
          pm2 restart b4us-website || pm2 start npm --name "b4us-website" -- run start

          # Wait for service to start
          sleep 5

          # Health check
          echo "🏥 Checking frontend service..."
          if pm2 describe b4us-website >/dev/null 2>&1; then
            echo "✅ PM2 process is running"

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -m 10 http://localhost:4242/ || echo "000")
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
              echo "✅ Frontend is online (status: $HTTP_STATUS) on port 4242"
            else
              echo "⚠️ Frontend health check failed (status: $HTTP_STATUS)"
              pm2 logs b4us-website --lines 10 --nostream
            fi
          else
            echo "❌ Frontend failed to start"
            pm2 logs b4us-website --lines 10 --nostream
            exit 1
          fi

          echo "🎉 Frontend deployment completed!"

      - name: 📊 Show status
        if: always()
        run: |
          echo "📊 Final status:"
          pm2 status b4us-website
          echo ""
          echo "🔗 Frontend URL: http://localhost:4242"
