name: Build and deploy Frontend to Azure Web App - b4us-prod-frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "frontend/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build (if presente)
        working-directory: ./frontend
        run: npm run build --if-present

      - name: Test server starts
        working-directory: ./frontend
        run: |
          PORT=3099 node server.js &
          SERVER_PID=$!
          echo "⏳ Waiting for server..."
          sleep 5

          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3099/ || echo "000")

          kill $SERVER_PID 2>/dev/null || true

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
            echo "✅ Server responded with status $HTTP_STATUS"
          else
            echo "❌ Server health check failed (status: $HTTP_STATUS)"
            exit 1
          fi

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "b4us-prod-website"
          slot-name: "Production"
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE }}

      - name: Health check production
        run: |
          sleep 30
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://b4us-prod-website-fkegfmavgndxe5a8.swedencentral-01.azurewebsites.net/health)
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Production is healthy"
          else
            echo "❌ Production health check failed (status: $HTTP_STATUS)"
            exit 1
          fi
