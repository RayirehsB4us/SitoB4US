name: Build and deploy Frontend to Azure Web App - b4us-prod-frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build (if presente)
        working-directory: ./frontend
        run: npm run build --if-present

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: |
            frontend/
            !frontend/node_modules/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "b4us-prod-website"
          slot-name: "Production"
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE }}

      - name: Health check production
        run: |
          echo "⏳ Waiting for deployment to stabilize..."
          sleep 45

          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://b4us-prod-website-fkegfmavgndxe5a8.swedencentral-01.azurewebsites.net/health || echo "000")
            
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Production is healthy (status: $HTTP_STATUS)"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⚠️ Health check attempt $RETRY_COUNT/$MAX_RETRIES failed (status: $HTTP_STATUS)"
            
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "🔄 Retrying in 10 seconds..."
              sleep 10
            fi
          done

          echo "❌ Production health check failed after $MAX_RETRIES attempts"
          exit 1
